name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions: {}

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Validate tag matches VERSION file
        run: |
          TAG="${{ github.ref_name }}"
          FILE_VERSION="v$(cat VERSION)"
          if [ "$TAG" != "$FILE_VERSION" ]; then
            echo "ERROR: Tag ${TAG} does not match VERSION file (${FILE_VERSION})"
            echo "       Either bump VERSION in a PR or retag."
            exit 1
          fi
          echo "OK: Tag matches VERSION file: ${TAG}"

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')
          CURRENT_TAG="${{ github.ref_name }}"

          echo "previous_tag=${PREVIOUS_TAG}" >> $GITHUB_OUTPUT

          if [ -z "$PREVIOUS_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s%n%b" HEAD)
          else
            LOG=$(git log --pretty=format:"- %s%n%b" ${PREVIOUS_TAG}..HEAD)
          fi

          {
            echo 'log<<EOF'
            echo "$LOG"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Read versions
        id: versions
        run: |
          source versions.env
          echo "hugo=${HUGO_VERSION}" >> $GITHUB_OUTPUT
          echo "nginx=${NGINX_VERSION}" >> $GITHUB_OUTPUT

      - name: Build and push multi-arch image
        id: build-push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            IMAGE_VERSION=${{ github.ref_name }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            HUGO_VERSION=${{ steps.versions.outputs.hugo }}
            NGINX_VERSION=${{ steps.versions.outputs.nginx }}

      - name: Update image tag in cv-gitops
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITOPS_PAT }}
          script: |
            const tag = context.ref.replace('refs/tags/', '');        // v0.1.0
            const imageTag = tag.replace(/^v/, '');                    // 0.1.0
            const previousTag = '${{ steps.changelog.outputs.previous_tag }}';
            const changelog = `${{ steps.changelog.outputs.log }}`;
            const owner = 'jakechowdhury';
            const repo = 'cv-gitops';
            const branch = `update-cv-site-${imageTag}`;
            const filePath = 'apps/cv-site/kustomization.yaml';

            const compareUrl = previousTag
              ? `https://github.com/${context.repo.owner}/cv-site/compare/${previousTag}...${tag}`
              : `https://github.com/${context.repo.owner}/cv-site/commits/${tag}`;

            const { data: file } = await github.rest.repos.getContent({ owner, repo, path: filePath });
            const content = Buffer.from(file.content, 'base64').toString();

            const updated = content.replace(
              /newTag: (?:"latest"|sha-[a-f0-9]{7}|v?\d+\.\d+\.\d+)/,
              `newTag: ${imageTag}`
            );

            if (updated === content) {
              throw new Error(`Tag replacement failed — no match in:\n${content}`);
            }

            const { data: ref } = await github.rest.git.getRef({ owner, repo, ref: 'heads/main' });
            await github.rest.git.createRef({ owner, repo, ref: `refs/heads/${branch}`, sha: ref.object.sha });
            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path: filePath,
              message: `chore: update cv-site image to ${tag}`,
              content: Buffer.from(updated).toString('base64'),
              sha: file.sha,
              branch,
            });

            await github.rest.pulls.create({
              owner, repo, head: branch, base: 'main',
              title: `chore: update cv-site image to ${imageTag}`,
              body: [
                `## cv-site ${tag}`,          // keep v prefix in the heading for readability
                '',
                '### Changes',
                changelog || '_No commit messages found._',
                '',
                `**Full diff:** ${compareUrl}`,
                '',
                `Automated image tag update from cv-site@${context.sha}`,
              ].join('\n'),
            });
