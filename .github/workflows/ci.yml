name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── Docker buildx (multi-arch: amd64 + arm64) ───────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Extract image metadata ───────────────────────────────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      # ── Build (and push on main) ─────────────────────────────────────────────
      - name: Build and push image
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Security: Trivy image scan ───────────────────────────────────────────
      # Outputs a table to the Actions log and saves a SARIF artifact to download.
      # SARIF upload to the Security tab requires GitHub Advanced Security (orgs only)
      # so we save the results as a downloadable artifact instead.
      - name: Run Trivy vulnerability scanner
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: table             # prints findings directly to the Actions log
          severity: CRITICAL,HIGH
          exit-code: '0'            # report only — don't fail the build on findings

      - name: Run Trivy (SARIF output for artifact)
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload Trivy results as artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results-${{ github.sha }}
          path: trivy-results.sarif
          retention-days: 30

      # ── Open image-tag PR to cv-gitops ──────────────────────────────────────
      - name: Update image tag in cv-gitops
        if: github.event_name != 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITOPS_PAT }}
          script: |
            const sha = context.sha.substring(0, 7);
            const newTag = `sha-${sha}`;
            const owner = 'jakechowdhury';
            const repo = 'cv-gitops';
            const branch = `update-cv-site-${sha}`;
            const filePath = 'apps/cv-site/base/kustomization.yaml';

            // Get current file
            const { data: file } = await github.rest.repos.getContent({ owner, repo, path: filePath });
            const content = Buffer.from(file.content, 'base64').toString();

            // Replace image tag (matches: newTag: sha-<7chars>)
            const updated = content.replace(
              /newTag: (?:"latest"|sha-[a-f0-9]{7})/,
              `newTag: ${newTag}`
            );
            if (updated === content) {
              throw new Error(`Failed to replace image tag in ${filePath} — regex matched nothing. Current content:\n${content}`);
            };

            // Create branch + commit
            const { data: ref } = await github.rest.git.getRef({ owner, repo, ref: 'heads/main' });
            await github.rest.git.createRef({ owner, repo, ref: `refs/heads/${branch}`, sha: ref.object.sha });
            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path: filePath, message: `chore: update cv-site image to ${newTag}`,
              content: Buffer.from(updated).toString('base64'),
              sha: file.sha,
              branch,
            });

            // Open PR
            await github.rest.pulls.create({
              owner, repo, head: branch, base: 'main',
              title: `chore: update cv-site image to ${newTag}`,
              body: `Automated image tag update from cv-site@${context.sha}`,
            });
