name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (amd64, local)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: cv-site:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan (table — fails on CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: cv-site:scan
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Trivy scan (SARIF artifact)
        if: always()
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: cv-site:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload Trivy SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results-${{ github.sha }}
          path: trivy-results.sarif
          retention-days: 30

  verify-version-bump:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check VERSION file exists
        run: |
          if [ ! -f VERSION ]; then
            echo "ERROR: VERSION file missing from repo root"
            exit 1
          fi
          echo "OK: VERSION file exists: $(cat VERSION)"

      - name: Validate VERSION format
        run: |
          VERSION=$(cat VERSION)
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: VERSION must be semver (e.g. 1.2.0), got: ${VERSION}"
            exit 1
          fi
          echo "OK: VERSION format valid: ${VERSION}"

      - name: Check VERSION was bumped relative to main
        run: |
          CURRENT=$(cat VERSION)
          MAIN=$(git show origin/main:VERSION 2>/dev/null || echo "0.0.0")

          echo "main:    ${MAIN}"
          echo "PR:      ${CURRENT}"

          if [ "$CURRENT" = "$MAIN" ]; then
            echo "ERROR: VERSION has not been bumped (still ${CURRENT})"
            echo "       Bump VERSION in this PR before merging."
            exit 1
          fi
          echo "OK: VERSION bumped: ${MAIN} -> ${CURRENT}"

      - name: Check VERSION is higher than main
        run: |
          CURRENT=$(cat VERSION)
          MAIN=$(git show origin/main:VERSION 2>/dev/null || echo "0.0.0")

          HIGHER=$(printf '%s\n%s' "$MAIN" "$CURRENT" | sort -V | tail -n1)
          if [ "$HIGHER" != "$CURRENT" ]; then
            echo "ERROR: VERSION must be higher than main (${MAIN}), got: ${CURRENT}"
            exit 1
          fi
          echo "OK: VERSION is higher than main: ${MAIN} -> ${CURRENT}"

      - name: Verify VERSION matches tag format we will create
        run: |
          VERSION=$(cat VERSION)
          echo "INFO: Release tag will be: v${VERSION}"
          echo "INFO: Run: git tag v${VERSION} && git push origin v${VERSION}"
