name: Build & Scan

on:
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions: {}

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (amd64, local)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: cv-site:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            IMAGE_VERSION=${{ github.sha }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

      - name: Trivy scan (table — fails on CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: cv-site:scan
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Trivy scan (job summary)
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: cv-site:scan
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0'
          output: trivy-summary.txt

      - name: Write Trivy results to job summary
        if: always()
        run: |
          echo "## Trivy Scan Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat trivy-summary.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload Trivy SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results-${{ steps.sha.outputs.short }}
          path: trivy-results.sarif
          retention-days: 30

  verify-version-bump:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: |
      github.event_name == 'pull_request' &&
      !contains(github.event.pull_request.labels.*.name, 'skip-version-bump')
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check VERSION file exists
        run: |
          if [ ! -f VERSION ]; then
            echo "ERROR: VERSION file missing from repo root"
            exit 1
          fi
          echo "OK: VERSION file exists: $(cat VERSION)"

      - name: Validate VERSION format
        run: |
          VERSION=$(cat VERSION)
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: VERSION must be semver (e.g. 1.2.0), got: ${VERSION}"
            exit 1
          fi
          echo "OK: VERSION format valid: ${VERSION}"

      - name: Check VERSION was bumped relative to main
        run: |
          CURRENT=$(cat VERSION)
          MAIN=$(git show origin/main:VERSION 2>/dev/null || echo "0.0.0")

          echo "main:    ${MAIN}"
          echo "PR:      ${CURRENT}"

          if [ "$CURRENT" = "$MAIN" ]; then
            echo "ERROR: VERSION has not been bumped (still ${CURRENT})"
            echo "       Bump VERSION in this PR before merging."
            exit 1
          fi
          echo "OK: VERSION bumped: ${MAIN} -> ${CURRENT}"

      - name: Check VERSION is higher than main
        run: |
          CURRENT=$(cat VERSION)
          MAIN=$(git show origin/main:VERSION 2>/dev/null || echo "0.0.0")

          HIGHER=$(printf '%s\n%s' "$MAIN" "$CURRENT" | sort -V | tail -n1)
          if [ "$HIGHER" != "$CURRENT" ]; then
            echo "ERROR: VERSION must be higher than main (${MAIN}), got: ${CURRENT}"
            exit 1
          fi
          echo "OK: VERSION is higher than main: ${MAIN} -> ${CURRENT}"

      - name: Verify VERSION matches tag format we will create
        run: |
          VERSION=$(cat VERSION)
          echo "INFO: Release tag will be: v${VERSION}"
          echo "INFO: Run: git tag v${VERSION} && git push origin v${VERSION}"

  secret-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@v3.95.2
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified

  preview-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      pages: write
      id-token: write
    if: github.event_name == 'pull_request'
    environment:
      name: pr-preview-${{ github.event.pull_request.number }}
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.154.5'
          extended: true

      - name: Build Hugo site
        env:
          HUGO_PARAMS_APPVERSION: pr-${{ github.event.pull_request.number }}
          HUGO_PARAMS_GITCOMMIT: ${{ github.sha }}
        run: hugo --minify --environment production --baseURL "https://jakechowdhury.github.io/cv-site/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Comment on PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.page_url }}';
            const sha = '${{ github.sha }}';
            const pr = context.issue.number;
            const body = [
              '## Preview Deployment',
              '',
              `**URL:** ${url}`,
              `**Commit:** \`${sha.substring(0, 7)}\``,
              `**PR:** #${pr}`,
              '',
              '_This preview is updated on every push to this PR._',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
            });

            const existing = comments.find(c => c.body.startsWith('## Preview Deployment'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr,
                body,
              });
            }
